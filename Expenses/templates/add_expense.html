<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Expense</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
      }

      .container {
        width: 100%;
        max-width: 520px;
      }

      .card {
        background: #fff;
        padding: 35px;
        border-radius: 20px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.08),
          0 5px 15px rgba(0, 0, 0, 0.05);
      }

      .top {
        text-align: center;
        margin-bottom: 30px;
      }

      .top h1 {
        font-size: 30px;
        color: #222;
        margin-bottom: 8px;
      }

      .top p {
        color: #666;
        font-size: 15px;
      }

      .form-group {
        margin-bottom: 22px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #444;
      }

      input,
      select {
        width: 100%;
        padding: 14px;
        border: 1px solid #d7dce2;
        border-radius: 12px;
        font-size: 15px;
        transition: 0.25s;
        background: #fafafa;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #dc3545;
        background: white;
        box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.12);
      }

      .submit-btn {
        width: 100%;
        border: none;
        background: #dc3545;
        color: white;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.25s;
      }

      .submit-btn:hover {
        background: #c82333;
        transform: translateY(-2px);
      }

      .back-btn {
        display: block;
        text-align: center;
        margin-top: 18px;
        text-decoration: none;
        color: #555;
        font-weight: 600;
        transition: 0.2s;
      }

      .back-btn:hover {
        color: #dc3545;
      }
      .submit-btn {
        width: 100%;
        border: none;
        background: #dc3545;
        color: white;
        padding: 15px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.25s;
      }

      .submit-btn:hover {
        background: #c82333;
        transform: translateY(-2px);
      }

      .submit-btn:active {
        transform: scale(0.98);
      }

      @media (max-width: 600px) {
        .card {
          padding: 25px;
        }

        .top h1 {
          font-size: 26px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="top">
          <h1>💸 Log New Expense</h1>
          <p>Record your expense details below.</p>
        </div>

        <form method="POST" action="{% url 'expenses:add_expense'  %}">
          {% csrf_token %} {% for field in form %}
          <div class="form-field form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}:</label>
            {{ field }} {% if field.errors %}
            <div class="errors">{{ field.errors }}</div>
            {% endif %}
          </div>
          {% endfor %}

          <button class="submit-btn" type="submit">💾 Save Expense</button>
        </form>

        <a href="{% url 'users:home' %}" class="back-btn">
          ← Back to Dashboard
        </a>
      </div>
    </div>

    <script>

    </script>
  </body>
</html>
