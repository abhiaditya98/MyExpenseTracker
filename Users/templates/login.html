<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --text-dark: #1f2937;
            --text-light: #4b5563;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --error-bg: #fef2f2;
            --error-text: #dc2626;
            --error-border: #fca5a5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-page); 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .login-container { 
            background: var(--bg-card); 
            padding: 40px 32px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); 
            width: 100%; 
            max-width: 420px; 
            box-sizing: border-box;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        h2 { 
            margin: 0 0 8px 0; 
            color: var(--text-dark); 
            text-align: center; 
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* Target fields outputted by {{ form.username }} and {{ form.password }} */
        form input:not([type="checkbox"]) { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            margin-top: 6px; 
            font-size: 15px;
            color: var(--text-dark);
            background-color: #fafafa;
            transition: all 0.2s ease;
            outline: none;
        }

        form input:not([type="checkbox"]):focus {
            background-color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Structural field layout classes */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            display: block;
        }

        /* Fixed non-stretching layout check alignment line */
        .checkbox-container {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input[type="checkbox"] {
            width: 16px !important;
            height: 16px !important;
            margin: 0 !important;
            padding: 0 !important;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--text-light);
        }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background-color: var(--success); 
            border: none; 
            border-radius: 8px; 
            color: white; 
            font-size: 15px; 
            font-weight: 600;
            cursor: pointer; 
            margin-top: 12px; 
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn:hover { 
            background-color: var(--success-hover); 
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Refactored notification style */
        .error-banner { 
            color: var(--error-text); 
            background-color: var(--error-bg); 
            border: 1px solid var(--error-border);
            padding: 12px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            margin-bottom: 24px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-banner svg {
            flex-shrink: 0;
        }

        .register-link { 
            text-align: center; 
            margin-top: 24px; 
            font-size: 14px; 
            color: var(--text-light);
        }

        .register-link a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>
    <div class="subtitle">Please enter your details to sign in</div>

    {% if form.errors %}
        <div class="error-banner">
            <!-- Mini visual indicator anchor graphic -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Your credentials do not match. Please try again.</span>
        </div>
    {% endif %}
    
    <form method="POST">
        {% csrf_token %}
        
        <!-- Render Username Field explicitly -->
        <div class="form-group">
            <label for="id_username">Username</label>
            {{ form.username }}
        </div>

        <!-- Render Password Field explicitly with toggle option -->
        <div class="form-group">
            <label for="id_password">Password</label>
            {{ form.password }}
            
            <label class="checkbox-container" for="toggle-password-checkbox">
                <input type="checkbox" id="toggle-password-checkbox" />
                <span class="checkbox-label">Show Password</span>
            </label>
        </div>

        <button type="submit" class="btn">Log In</button>
    </form>

    <div class="register-link">
        Don't have an account? <a href="{% url 'users:register' %}">Register here</a>
    </div>
</div>

<script>
    // Handles show/hide feature seamlessly for built-in Django form structures
    document.getElementById('toggle-password-checkbox').addEventListener('change', function () {
        // Django's AuthenticationForm uses 'id_password' by default
        const passwordField = document.getElementById('id_password');
        if (passwordField) {
            passwordField.type = this.checked ? 'text' : 'password';
        }
    });
</script>
</body>
</html>
